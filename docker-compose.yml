# Zensical Docker Compose — local development stack
#
# Port design (10-port range per module):
#   sonality   8000–8009   API on 8000
#   fathom     8010–8019   API on 8010
#   speaches   8020–8029   API on 8020
#   llama.cpp  8080        OpenAI-compatible LLM endpoint inside Compose
#   embed      8090        llama.cpp embedding server (Qwen3-Embedding-4B Q4_K_M, CPU)
#   (infrastructure services keep standard ports)
#
# Both sonality and fathom share the Neo4j instance (separate node labels).
# Sonality and Fathom use the local llama.cpp endpoint by default in Compose.
#
# Note: default passwords are for local dev only. Override in .env for deployment.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:
  # --- Sonality (port 8000) ---
  sonality:
    build:
      context: .
      dockerfile: docker/sonality.Dockerfile
    ports:
      - "8000:8000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      SONALITY_BASE_URL: http://llama-cpp:8080/v1
      SONALITY_API_KEY: local
      SONALITY_MODEL: ${SONALITY_MODEL:-gemma-4-E4B-it-Q8_0}
      SONALITY_NEO4J_URL: bolt://neo4j:7687
      SONALITY_QDRANT_URL: http://qdrant:6333
      SONALITY_EMBEDDING_URL: http://llama-cpp-embed:8090
      SONALITY_FATHOM_URL: http://fathom:8010
      SONALITY_LOG_LEVEL: DEBUG
      SONALITY_LLM_CONCURRENCY: 1            # matches llama.cpp --parallel 1
      SONALITY_CHAT_INPUT_TOKEN_BUDGET: 150000  # 262K ctx × 0.65 - 16K reserve
      SONALITY_AGENT_TIME_BUDGET: 360
    volumes:
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      fathom:
        condition: service_healthy
      llama-cpp:
        condition: service_healthy
      llama-cpp-embed:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s
    logging: *default-logging

  # --- Browserless (Playwright via CDP, port 8030) ---
  browserless:
    image: ghcr.io/browserless/chromium:latest
    ports:
      - "8030:3000"
    environment:
      TIMEOUT: 600000
      CONCURRENT: 10
      QUEUED: 20
      HEALTH: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/json/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging: *default-logging

  # --- Fathom (port 8010) ---
  fathom:
    build:
      context: .
      dockerfile: docker/fathom.Dockerfile
    tty: true
    ports:
      - "8010:8010"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      FATHOM_BASE_URL: http://llama-cpp:8080/v1
      FATHOM_API_KEY: local
      FATHOM_MODEL: ${FATHOM_MODEL:-Qwen3.6-35B-A3B-UD-Q4_K_XL}
      FATHOM_NEO4J_URL: bolt://neo4j:7687
      FATHOM_NEO4J_USER: neo4j
      FATHOM_NEO4J_PASSWORD: sonality_password
      FATHOM_QDRANT_URL: http://qdrant:6333
      FATHOM_EMBEDDING_URL: http://llama-cpp-embed:8090
      FATHOM_BROWSER_WS_URL: ws://browserless:3000
      FATHOM_LOG_LEVEL: DEBUG
      FATHOM_LLM_CONCURRENCY: 1              # matches llama.cpp --parallel 1
      FATHOM_SESSION_TIMEOUT: 7200
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      browserless:
        condition: service_healthy
      llama-cpp:
        condition: service_healthy
      llama-cpp-embed:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=4)\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging: *default-logging

  # --- Neo4j (shared by sonality + fathom) ---
  neo4j:
    image: neo4j:5.26
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: neo4j/sonality_password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_dbms_memory_transaction_total_max: 512M
      NEO4J_db_memory_transaction_max: 256M
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p sonality_password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    logging: *default-logging

  # --- Qdrant ---
  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    environment:
      QDRANT__LOG_LEVEL: INFO
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__ON_DISK_PAYLOAD: "true"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && printf \"GET /readyz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q \"all shards are ready\" <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging: *default-logging

  # --- llama.cpp LLM server (ROCm, port 8080) ---
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    ports:
      - "8080:8080"
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    shm_size: 16gb
    volumes:
      - ./.models:/models:ro
    environment:
      HSA_OVERRIDE_GFX_VERSION: 11.0.0
      HIP_VISIBLE_DEVICES: "0"
      ROCR_VISIBLE_DEVICES: "0"
    command:
      - --model
      - /models/${LLM_MODEL:-Qwen3.6-35B-A3B-UD-Q4_K_XL}.gguf
      - --port
      - "8080"
      - --jinja
      - --reasoning-format
      - deepseek
      - --flash-attn
      - "on"
      - -ngl
      - all
      - --main-gpu
      - "0"
      - --ctx-size
      - "262144"
      - --parallel
      - "1"
      - --kv-unified
      - --cache-type-k
      - q4_0
      - --cache-type-v
      - q4_0
      - --cache-ram
      - "0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    logging: *default-logging

  # --- llama.cpp Embedding server (CPU, port 8090) ---
  # Runs on CPU because the LLM model occupies nearly all VRAM.
  # CPU is viable for embeddings: batch-oriented, not autoregressive.
  # --parallel 4: process 4 texts concurrently across slots.
  # --threads-batch 12: use all logical cores (HT helps for batch embedding).
  # --batch-size/--ubatch-size must match to avoid silent downgrade.
  llama-cpp-embed:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    ports:
      - "8090:8090"
    volumes:
      - ./.models:/models:ro
    command:
      - --model
      - /models/${EMBEDDING_MODEL:-Qwen3-Embedding-4B-Q4_K_M}.gguf
      - --port
      - "8090"
      - --embedding
      - --pooling
      - last
      - -ngl
      - "0"
      - --ctx-size
      - "8192"
      - --parallel
      - "4"
      - --batch-size
      - "2048"
      - --ubatch-size
      - "2048"
      - --threads-batch
      - "10"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    logging: *default-logging

  # --- Speaches STT/TTS (port 8020) ---
  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    ports:
      - "8020:8000"
    volumes:
      - speaches_cache:/home/ubuntu/.cache/huggingface/hub
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        uvicorn --factory speaches.main:create_app --host 0.0.0.0 --port 8000 &
        until curl -sf http://localhost:8000/health; do sleep 1; done
        curl -X POST http://localhost:8000/v1/models/Systran/faster-distil-whisper-large-v3
        curl -X POST http://localhost:8000/v1/models/speaches-ai/Kokoro-82M-v1.0-ONNX
        wait
    environment:
      CUDA_VISIBLE_DEVICES: ""
      LOG_LEVEL: info
      STT_MODEL_TTL: -1
      TTS_MODEL_TTL: -1
      WHISPER__INFERENCE_DEVICE: cpu
      WHISPER__COMPUTE_TYPE: int8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    restart: unless-stopped
    logging: *default-logging

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  qdrant_snapshots:
  speaches_cache:
