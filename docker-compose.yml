# Sonality Docker Compose configuration
#
# Two-service stack: Neo4j (graph + state) + Qdrant (vectors + hybrid search)
# Neo4j: Schema initialized by application on startup

services:
  sonality:
    build: .
    ports:
      - "8000:8000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      SONALITY_NEO4J_URL: bolt://neo4j:7687
      SONALITY_QDRANT_URL: http://qdrant:6333
      SONALITY_LOG_LEVEL: DEBUG
    volumes:
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: neo4j/sonality_password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 512M
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p sonality_password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && printf 'GET /readyz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'all shards are ready' <&3"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    ports:
      - "8001:8000"
    volumes:
      - speaches_cache:/home/ubuntu/.cache/huggingface/hub
    environment:
      # Prevent ONNX from attempting CUDA (eliminates noisy fallback errors)
      CUDA_VISIBLE_DEVICES: ""
      # Logging
      LOG_LEVEL: info
      # Model persistence (never unload)
      STT_MODEL_TTL: -1
      TTS_MODEL_TTL: -1
      # STT configuration (CPU optimized)
      WHISPER__INFERENCE_DEVICE: cpu
      WHISPER__COMPUTE_TYPE: int8
      # Preload STT and TTS models on startup
      PRELOAD_MODELS: '["Systran/faster-distil-whisper-large-v3", "speaches-ai/Kokoro-82M-v1.0-ONNX"]'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  speaches_cache:
