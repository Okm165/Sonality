[project]
site_name = "Sonality"
site_url = "https://sonality.dev/docs/"
site_description = "LLM agent with self-evolving personality via evidence-gated belief revision"
docs_dir = "docs"
site_dir = "site"
extra_javascript = [
  "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

[project.theme]
name = "material"
features = [
  "navigation.instant",
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "navigation.top",
  "toc.integrate",
  "search.suggest",
  "search.highlight",
  "content.code.copy",
  "content.tabs.link",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "cyan"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "cyan"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/sonality"

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

