[project]
site_name = "Sonality"
site_description = "LLM agent with self-evolving personality and beliefs — grounded in 200+ academic references"
site_author = "Sonality"
site_url = "https://okm165.github.io/Sonality/"
copyright = "&copy; 2025–2026 Sonality contributors"

extra_javascript = [
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

nav = [
    { "Home" = "index.md" },
    { "Getting Started" = "getting-started.md" },
    { "Configuration" = "configuration.md" },
    { "API Reference" = "api-reference.md" },
    { "Architecture" = [
        { "Overview" = "architecture/overview.md" },
        { "Data Flow" = "architecture/data-flow.md" },
        { "Memory System" = "architecture/memory.md" },
        { "Retrieval Pipeline" = "architecture/retrieval-pipeline.md" },
        { "Knowledge Extraction" = "architecture/knowledge-extraction.md" },
        { "Forgetting System" = "architecture/forgetting-system.md" },
        { "Semantic Features" = "architecture/semantic-features-worker.md" },
        { "Chat Clients" = "architecture/chat-clients.md" },
        { "Infrastructure" = "architecture/infrastructure.md" },
        { "Prompts Reference" = "architecture/prompts-reference.md" },
    ] },
    { "Concepts" = [
        { "ESS" = "concepts/ess.md" },
        { "Beliefs" = "concepts/beliefs.md" },
        { "Reflection" = "concepts/reflection.md" },
        { "Anti-Sycophancy" = "concepts/anti-sycophancy.md" },
    ] },
    { "Testing" = [
        { "Overview" = "testing.md" },
        { "Benchmarks" = "testing/benchmark-system.md" },
    ] },
    { "Reference" = [
        { "Project Structure" = "project-structure.md" },
        { "Usage Guide" = "usage-and-teaching-plan.md" },
    ] },
]

[project.theme]
font.text = "Inter"
font.code = "JetBrains Mono"
features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.sections",
    "navigation.expand",
    "navigation.top",
    "navigation.path",
    "navigation.indexes",
    "content.code.copy",
    "content.code.annotate",
    "toc.follow",
    "search.highlight",
    "search.suggest",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

# Dark mode first = default
[[project.theme.palette]]
scheme = "slate"
primary = "deep purple"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "deep purple"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Markdown extensions
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.admonition]

[project.markdown_extensions."pymdownx.details"]

[project.markdown_extensions."pymdownx.superfences"]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true

[project.markdown_extensions."pymdownx.inlinehilite"]

[project.markdown_extensions."pymdownx.snippets"]

[project.markdown_extensions."pymdownx.arithmatex"]
generic = true

[project.markdown_extensions.tables]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]
