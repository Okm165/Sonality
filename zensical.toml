[project]
site_name = "Zensical"
site_description = "Multi-agent workspace: Sonality personality engine, Fathom autonomous research, shared LLM infrastructure"
site_author = "Zensical contributors"
site_url = "https://okm165.github.io/Sonality/"
copyright = "&copy; 2025–2026 Zensical contributors"

extra_javascript = [
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

nav = [
    { "Home" = "index.md" },
    { "Getting Started" = "getting-started.md" },
    { "Project Structure" = "project-structure.md" },
    { "Sonality" = [
        { "Configuration" = "sonality/configuration.md" },
        { "API Reference" = "sonality/api-reference.md" },
        { "Overview" = "sonality/architecture/overview.md" },
        { "Data Flow" = "sonality/architecture/data-flow.md" },
        { "Memory System" = "sonality/architecture/memory.md" },
        { "Retrieval Pipeline" = "sonality/architecture/retrieval-pipeline.md" },
        { "Knowledge Extraction" = "sonality/architecture/knowledge-extraction.md" },
        { "Forgetting System" = "sonality/architecture/forgetting-system.md" },
        { "Semantic Features" = "sonality/architecture/semantic-features-worker.md" },
        { "Chat Clients" = "sonality/architecture/chat-clients.md" },
        { "Infrastructure" = "sonality/architecture/infrastructure.md" },
        { "Prompts Reference" = "sonality/architecture/prompts-reference.md" },
        { "Concepts — ESS" = "sonality/concepts/ess.md" },
        { "Concepts — Beliefs" = "sonality/concepts/beliefs.md" },
        { "Concepts — Reflection" = "sonality/concepts/reflection.md" },
        { "Concepts — Anti-Sycophancy" = "sonality/concepts/anti-sycophancy.md" },
        { "Testing" = "sonality/testing.md" },
        { "Benchmarks" = "sonality/testing/benchmark-system.md" },
        { "Usage Guide" = "sonality/usage-and-teaching-plan.md" },
    ] },
    { "Fathom" = [
        { "Overview" = "fathom/overview.md" },
        { "Configuration" = "fathom/configuration.md" },
    ] },
]

[project.theme]
font.text = "Inter"
font.code = "JetBrains Mono"
features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.sections",
    "navigation.expand",
    "navigation.top",
    "navigation.path",
    "navigation.indexes",
    "content.code.copy",
    "content.code.annotate",
    "toc.follow",
    "search.highlight",
    "search.suggest",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

# Dark mode first = default
[[project.theme.palette]]
scheme = "slate"
primary = "deep purple"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "deep purple"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Markdown extensions
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.admonition]

[project.markdown_extensions."pymdownx.details"]

[project.markdown_extensions."pymdownx.superfences"]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true

[project.markdown_extensions."pymdownx.inlinehilite"]

[project.markdown_extensions."pymdownx.snippets"]

[project.markdown_extensions."pymdownx.arithmatex"]
generic = true

[project.markdown_extensions.tables]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]
